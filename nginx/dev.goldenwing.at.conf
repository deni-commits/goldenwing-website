# GoldenWing Dev/Staging — dev.goldenwing.at
server {
    listen 80;
    server_name dev.goldenwing.at;
    return 301 https://dev.goldenwing.at$request_uri;
}

server {
    listen 443 ssl http2;
    server_name dev.goldenwing.at;

    ssl_certificate /etc/letsencrypt/live/dev.goldenwing.at/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dev.goldenwing.at/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;

    location / {
        proxy_pass http://127.0.0.1:3003;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
